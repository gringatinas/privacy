<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sua Marca</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:Poppins,sans-serif;
  background:#000;
  color:#fff;
}

/* PADRÃO CARD */
.card{
  background:#0D0D0D;
  margin:16px;
  border-radius:18px;
  overflow:hidden;
}

/* ========== BLOCO 1 ========== */

.cover{
  height:140px;
  background:url('capa.jpg') center/cover no-repeat;
}

.profile-area{
  text-align:center;
  padding:0 16px 24px;
  margin-top:-48px;
}

.profile-img{
  width:96px;
  height:96px;
  border-radius:50%;
  border:4px solid #000;
}

.name-row{
  margin-top:10px;
  font-size:18px;
  font-weight:600;
}

.verified{
  color:#ff8c5a;
  font-size:14px;
}

.username{
  font-size:13px;
  color:#8A8A8A;
  margin-top:4px;
}

.description{
  font-size:14px;
  line-height:1.4;
  color:#CFCFCF;
  margin-top:12px;
}

.city{
  font-size:13px;
  color:#9A9A9A;
  margin-top:8px;
}

.socials{
  display:flex;
  justify-content:center;
  gap:16px;
  margin-top:10px;
  font-size:13px;
  color:#ff8c5a;
}

.actions{
  display:flex;
  justify-content:center;
  gap:12px;
  margin-top:18px;
}

.btn{
  height:44px;
  padding:0 22px;
  border-radius:22px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:14px;
  font-weight:600;
  cursor:pointer;
}

.btn-pix{
  background:linear-gradient(90deg,#ff8c5a,#ffb199);
  color:#000;
}

.btn-chat{
  background:#1A1A1A;
  border:1px solid #262626;
}

/* ========== BLOCO 2 ========== */

.section-title{
  font-size:16px;
  font-weight:600;
  padding:16px;
}

.plan{
  height:64px;
  margin:0 16px 12px;
  padding:0 18px;
  border-radius:16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:linear-gradient(90deg,#ff8c5a,#ffb199);
  color:#000;
  font-weight:600;
  cursor:pointer;
}

/* ========== BLOCO 3 ========== */

.post-stats{
  display:flex;
  justify-content:space-between;
  padding:16px;
  font-size:13px;
  color:#9A9A9A;
}

.mini-profile{
  display:flex;
  align-items:center;
  gap:10px;
  padding:0 16px 12px;
}

.mini-profile img{
  width:40px;
  height:40px;
  border-radius:50%;
}

.mini-name{
  font-size:14px;
  font-weight:600;
}

.mini-user{
  font-size:12px;
  color:#8A8A8A;
}

.locked-post{
  height:220px;
  margin:0 16px 16px;
  border-radius:16px;
  background:url('post.jpg') center/cover;
  position:relative;
  overflow:hidden;
  filter:blur(6px);
}

.overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.45);
  display:flex;
  align-items:center;
  justify-content:center;
  gap:24px;
  font-size:13px;
  font-weight:600;
  filter:none;
}

/* ========== MODAL PIX ========== */

.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  align-items:center;
  justify-content:center;
}

.modal-content{
  background:#111;
  width:90%;
  max-width:350px;
  padding:24px;
  border-radius:18px;
  text-align:center;
}

.modal img{
  width:200px;
  margin:15px 0;
}

.pix-code{
  background:#000;
  padding:10px;
  border-radius:10px;
  font-size:12px;
  word-break:break-all;
  margin-bottom:12px;
}

.btn-copy{
  background:linear-gradient(90deg,#ff8c5a,#ffb199);
  border:none;
  padding:12px;
  border-radius:22px;
  font-weight:600;
  width:100%;
}
</style>
</head>
<body>

<!-- BLOCO 1 -->
<div class="card">
  <div class="cover"></div>
  <div class="profile-area">
    <img src="perfil.jpg" class="profile-img">
    <div class="name-row">SEU NOME <span class="verified">✔</span></div>
    <div class="username">@seuuser</div>
    <div class="description">Copy estratégica forte aqui.</div>
    <div class="city">📍 Sua Cidade</div>
    <div class="socials">
      <div>Instagram</div>
      <div>Twitter</div>
    </div>
    <div class="actions">
      <div class="btn btn-pix" onclick="openModal()">Mimo (Pix)</div>
      <div class="btn btn-chat" onclick="window.open('https://wa.me/SEUNUMERO')">Chat</div>
    </div>
  </div>
</div>

<!-- BLOCO 2 -->
<div class="card">
  <div class="section-title">Assinaturas</div>
  <div class="plan" onclick="openModal()">1 Mês <span>R$ 39,90</span></div>
  <div class="plan" onclick="openModal()">6 Meses Promo <span>R$ 89,90</span></div>
  <div class="plan" onclick="openModal()">12 Meses VIP <span>R$ 149,90</span></div>
</div>

<!-- BLOCO 3 -->
<div class="card">
  <div class="post-stats">
    <span>15 Postagens</span>
    <span>15 Mídias</span>
  </div>

  <div class="mini-profile">
    <img src="perfil.jpg">
    <div>
      <div class="mini-name">SEU NOME <span class="verified">✔</span></div>
      <div class="mini-user">@seuuser</div>
    </div>
  </div>

  <div class="locked-post">
    <div class="overlay">
      <div>📸 8</div>
      <div>🎥 3</div>
      <div>❤️ 2.4K</div>
    </div>
  </div>
</div>

<!-- MODAL PIX -->
<div class="modal" id="pixModal">
  <div class="modal-content">
    <h3>Pagamento via Pix</h3>
    <img src="qrcode.png">
    <div class="pix-code" id="pixCode">SUA CHAVE PIX AQUI</div>
    <button class="btn-copy" onclick="copyPix()">Copiar código Pix</button>
  </div>
</div>

<script>
function openModal(){
  document.getElementById("pixModal").style.display="flex";
}
function copyPix(){
  let code=document.getElementById("pixCode").innerText;
  navigator.clipboard.writeText(code);
  alert("Código Pix copiado!");
}
</script>

</body>
</html>
