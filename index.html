<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sua Marca</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:Poppins,sans-serif;
  background:#000;
  color:#fff;
}

/* CARD BASE */
.card{
  background:#0D0D0D;
  margin:16px;
  border-radius:18px;
  overflow:hidden;
}

/* ===== BLOCO 1 ===== */

.cover{
  height:140px;
  background:url('capa.jpg') center/cover no-repeat;
}

.profile-area{
  padding:0 16px 20px;
}

.profile-header{
  display:flex;
  align-items:flex-end;
  gap:14px;
  margin-top:-70px; /* sobrepõe metade da foto */
}

.profile-img{
  width:90px;
  height:90px;
  border-radius:50%;
  border:4px solid #000;
}

.name-row{
  font-size:18px;
  font-weight:600;
}

.verified{
  color:#ff8c5a;
  font-size:14px;
}

.username{
  font-size:13px;
  color:#8A8A8A;
  margin-top:4px;
}

.description{
  font-size:14px;
  line-height:1.4;
  color:#CFCFCF;
  margin-top:14px;
}

.read-more{
  color:#ff8c5a;
  cursor:pointer;
  font-weight:500;
  margin-left:4px;
}

.content-stats{
  display:flex;
  gap:18px;
  margin-top:12px;
  font-size:12px;
  color:#9A9A9A;
  align-items:center;
}

.content-stats svg{
  width:14px;
  height:14px;
  margin-right:4px;
  stroke:#9A9A9A;
}

/* REDES SOCIAIS */

.socials{
  display:flex;
  gap:16px;
  margin-top:12px;
}

.social-icon{
  width:28px;
  height:28px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#ff8c5a;
  transition:0.2s;
}

.social-icon svg{
  width:22px;
  height:22px;
}

.social-icon:hover{
  transform:scale(1.1);
  opacity:0.8;
}

/* BOTÕES */

.actions{
  display:flex;
  gap:12px;
  margin-top:18px;
}

.btn{
  height:42px;
  padding:0 18px;
  border-radius:22px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:14px;
  font-weight:600;
  cursor:pointer;
}

.btn-pix{
  background:linear-gradient(90deg,#ff8c5a,#ffb199);
  color:#000;
}

.btn-chat{
  background:#1A1A1A;
  border:1px solid #262626;
}

/* ===== BLOCO 2 ===== */

.section-title{
  font-size:16px;
  font-weight:600;
  padding:16px;
}

.plan{
  height:64px;
  margin:0 16px 12px;
  padding:0 18px;
  border-radius:16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:linear-gradient(90deg,#ff8c5a,#ffb199);
  color:#000;
  font-weight:600;
  cursor:pointer;
}

/* ===== BLOCO 3 ===== */

.post-stats{
  display:flex;
  justify-content:space-between;
  padding:16px;
  font-size:13px;
  color:#9A9A9A;
}

.mini-profile{
  display:flex;
  align-items:center;
  gap:10px;
  padding:0 16px 12px;
}

.mini-profile img{
  width:40px;
  height:40px;
  border-radius:50%;
}

.mini-name{
  font-size:14px;
  font-weight:600;
}

.mini-user{
  font-size:12px;
  color:#8A8A8A;
}

.locked-post{
  height:220px;
  margin:0 16px 16px;
  border-radius:16px;
  background:url('post.jpg') center/cover;
  position:relative;
  overflow:hidden;
  filter:blur(6px);
}

.overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.45);
  display:flex;
  align-items:center;
  justify-content:center;
  gap:24px;
  font-size:13px;
  font-weight:600;
  filter:none;
}

/* ===== MODAL PIX ===== */

.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  align-items:center;
  justify-content:center;
}

.modal-content{
  background:#111;
  width:90%;
  max-width:350px;
  padding:24px;
  border-radius:18px;
  text-align:center;
}

.modal img{
  width:200px;
  margin:15px 0;
}

.pix-code{
  background:#000;
  padding:10px;
  border-radius:10px;
  font-size:12px;
  word-break:break-all;
  margin-bottom:12px;
}

.btn-copy{
  background:linear-gradient(90deg,#ff8c5a,#ffb199);
  border:none;
  padding:12px;
  border-radius:22px;
  font-weight:600;
  width:100%;
}
</style>
</head>
<body>

<!-- BLOCO 1 -->
<div class="card">
  <div class="cover"></div>
  <div class="profile-area">

    <div class="profile-header">
      <img src="perfil.jpg" class="profile-img">
      <div>
        <div class="name-row">SEU NOME <span class="verified">✔</span></div>
        <div class="username">@seuuser</div>
      </div>
    </div>

    <div class="description">
      <span id="shortText">Copy estratégica forte aqui. Algo que gere curiosidade...</span>
      <span id="fullText" style="display:none;">
        Copy estratégica forte aqui. Algo que gere curiosidade e desejo imediato, criando conexão e despertando interesse contínuo pelo conteúdo exclusivo disponível no perfil.
      </span>
      <span class="read-more" onclick="toggleText()" id="toggleBtn">Ler mais</span>
    </div>

    <!-- CONTADORES SVG -->
    <div class="content-stats">
      <div style="display:flex;align-items:center;">
        <svg fill="none" viewBox="0 0 24 24" stroke-width="2">
          <circle cx="12" cy="12" r="9"></circle>
        </svg>
        283
      </div>

      <div style="display:flex;align-items:center;">
        <svg fill="none" viewBox="0 0 24 24" stroke-width="2">
          <rect x="4" y="6" width="16" height="12"></rect>
        </svg>
        470
      </div>

      <div style="display:flex;align-items:center;">
        <svg fill="none" viewBox="0 0 24 24" stroke-width="2">
          <path d="M12 21s-7-4.35-7-10a4 4 0 018-1 4 4 0 018 1c0 5.65-7 10-7 10z"></path>
        </svg>
        293K
      </div>
    </div>

    <div class="city">📍 Sua Cidade</div>

    <div class="socials">
      <!-- mantido igual -->
    </div>

    <div class="actions">
      <div class="btn btn-pix" onclick="openModal()">Mimo (Pix)</div>
      <div class="btn btn-chat" onclick="window.open('https://wa.me/SEUNUMERO')">Chat</div>
    </div>

  </div>
</div>

<!-- restante do HTML permanece igual -->

<script>
function toggleText(){
  let shortText=document.getElementById("shortText");
  let fullText=document.getElementById("fullText");
  let btn=document.getElementById("toggleBtn");

  if(fullText.style.display==="none"){
    fullText.style.display="inline";
    shortText.style.display="none";
    btn.innerText="Ler menos";
  }else{
    fullText.style.display="none";
    shortText.style.display="inline";
    btn.innerText="Ler mais";
  }
}

function openModal(){
  document.getElementById("pixModal").style.display="flex";
}
function copyPix(){
  let code=document.getElementById("pixCode").innerText;
  navigator.clipboard.writeText(code);
  alert("Código Pix copiado!");
}
</script>

</body>
</html>
